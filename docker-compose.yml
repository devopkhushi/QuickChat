version: '3.9'
services:
  mongo:
    image: mongo:6
    container_name: quickchat-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: quickchat-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: quickchat-client
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      - server

volumes:
  mongo-data:
